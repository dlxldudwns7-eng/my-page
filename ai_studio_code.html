<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>실시간 정보 조회</title>
    <style>
        /* 기본 스타일 및 모바일 최적화 */
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            margin: 0; padding: 0; background-color: #f5f5f7; color: #333;
            display: flex; flex-direction: column; min-height: 100vh;
        }
        .container { flex: 1; max-width: 500px; margin: 0 auto; background: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); }

        /* 상단 이미지 영역 */
        .image-section { width: 100%; height: 250px; overflow: hidden; background-color: #eee; }
        #target-image { width: 100%; height: 100%; object-fit: cover; }

        /* 중단 정보 영역 */
        .info-section { padding: 20px; border-bottom: 1px solid #eee; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; margin-bottom: 10px; }
        .status-online { background: #e1f5fe; color: #0288d1; }
        #target-name { margin: 0; font-size: 1.5rem; color: #111; }
        #target-status { margin: 8px 0 0; color: #666; line-height: 1.5; }

        /* 하단 지도 영역 */
        #map { width: 100%; height: 350px; background-color: #e5e3df; }

        /* 로딩 화면 */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="loader">데이터를 불러오는 중...</div>

    <div class="container">
        <!-- 상단: 이미지 -->
        <div class="image-section">
            <img id="target-image" src="" alt="대상 이미지">
        </div>

        <!-- 중단: 정보 -->
        <div class="info-section">
            <div class="status-badge status-online">실시간 정보</div>
            <h2 id="target-name">-</h2>
            <p id="target-status">-</p>
        </div>

        <!-- 하단: 구글 지도 -->
        <div id="map"></div>
    </div>

    <!-- Google Maps API (YOUR_API_KEY 부분을 본인의 API 키로 교체해야 함) -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initApp" async defer></script>

    <script>
        async function initApp() {
            try {
                // 1. data.json 파일로부터 데이터 호출
                const response = await fetch('data.json');
                const data = await response.json();

                // 2. HTML 요소에 데이터 바인딩
                document.getElementById('target-name').textContent = data.name;
                document.getElementById('target-status').textContent = data.status;
                document.getElementById('target-image').src = data.image_url;
                document.title = `${data.name} - 정보 조회`;

                // 3. 구글 지도 초기화
                const position = { lat: data.lat, lng: data.lng };
                const map = new google.maps.Map(document.getElementById('map'), {
                    zoom: 16,
                    center: position,
                    disableDefaultUI: true, // 읽기 전용을 위해 UI 단순화
                    zoomControl: true
                });

                // 4. 마커 표시
                new google.maps.Marker({
                    position: position,
                    map: map,
                    title: data.name
                });

                // 로더 제거
                document.getElementById('loader').style.display = 'none';

            } catch (error) {
                console.error("데이터를 불러오는데 실패했습니다:", error);
                document.getElementById('loader').textContent = "데이터를 불러올 수 없습니다.";
            }
        }
    </script>
</body>
</html>
